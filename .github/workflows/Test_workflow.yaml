name: HelloWorld123

on: 
  push:
    branches: ["main"]
    paths-ignore:
      - ".github/workflows/*"
  pull_request:
    branches: ["main"]
  repository_dispatch:
    types: ["on-demand-test"]

jobs:
  hello-job:
    runs-on: ubuntu-latest
    steps:
      - name: Run a one-lone script
        run: echo "Hello Github Actions!"
      - name: Retrive client payload
        run: 'echo "Client send payload status: ${{ github.event.client_payload.status }}"'
  second-job:
    runs-on: windows-latest
    needs: hello-job
    steps:
      - run: echo "this job is running on ${{runner.os}}"
      
